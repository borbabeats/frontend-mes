name: Deploy Frontend to EC2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint || true
      
      - name: Build application
        run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Get runner public IP
        id: ip
        uses: haythem/public-ip@v1.3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Add runner IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --region us-east-1 \
            --group-id sg-097e19a6935ebaca8 \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 60s
          script: |
            # Criar diretório se não existir
            sudo mkdir -p /opt/frontend-mes
            sudo chown -R ec2-user:ec2-user /opt/frontend-mes
            
            # Entrar no diretório do projeto
            cd /opt/frontend-mes
            
            # Clonar se for primeira vez
            if [ ! -d ".git" ]; then
              git clone https://github.com/borbabeats/frontend-mes.git .
            fi
            
            # Fazer pull das atualizações
            git pull origin main
            
            # Instalar dependências
            npm ci
            
            # Parar processo atual do frontend
            pm2 stop frontend-mes || true
            
            # Build da aplicação
            npm run build
            
            # Iniciar frontend com PM2
            pm2 start npm --name "frontend-mes" -- start
            
            # Aguardar aplicação iniciar
            sleep 15
            
            # Verificar status
            pm2 status
            
            # Mostrar logs recentes
            pm2 logs frontend-mes --lines 20
      
      - name: Configure AWS credentials for cleanup
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Remove runner IP from Security Group
        if: always()
        run: |
          if [ -n "${{ steps.ip.outputs.ipv4 }}" ]; then
            aws ec2 revoke-security-group-ingress \
              --region us-east-1 \
              --group-id sg-097e19a6935ebaca8 \
              --protocol tcp \
              --port 22 \
              --cidr ${{ steps.ip.outputs.ipv4 }}/32
          else
            echo "No IP to remove from Security Group"
          fi

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Health Check
        run: |
          echo "Testing frontend health endpoint..."
          for i in {1..5}; do
            echo "Attempt $i/5..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://${{ secrets.EC2_HOST }}:3001)
            echo "Response code: $response"
            if [ $response -eq 200 ]; then
              echo "Health check passed - Frontend is responding"
              exit 0
            fi
            echo "Retrying in 15 seconds..."
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1
      
      - name: Frontend Accessibility Check
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:3001)
          if [ $response -eq 200 ]; then
            echo "Frontend is accessible"
          else
            echo "Frontend check failed - Status code: $response"
            exit 1
          fi
